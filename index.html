<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Durojaiye Alao Memorial College</title>
  <meta name="description" content="Durojaiye Alao Memorial College Portal">
  <style>
    /* General Styles */
    body {
      font-family: 'Arial', sans-serif;
      background: #fffaf0; /* soft cream */
      margin: 0;
      padding: 0;
      color: #333;
    }

    /* Header with gradient */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: linear-gradient(135deg, #fffaf0, #f0f5ff); /* cream to soft blue */
      border-bottom: 3px solid #e6d6c3;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    header a.logo {
      color: #b03a2e; /* subtle red */
      text-decoration: none;
      font-weight: bold;
      font-size: 1.5em;
    }

    nav a {
      color: #1a4d8f; /* subtle blue */
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
    }

    nav a:hover {
      color: #b03a2e; /* red hover */
    }

    main {
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
    }

    h1 {
      color: #b03a2e; /* red main title */
      margin-bottom: 40px;
      background: linear-gradient(90deg, #fffaf0 0%, #f0f5ff 100%);
      padding: 10px 20px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    form {
      background: linear-gradient(145deg, #fff, #fffaf0); /* subtle cream gradient */
      padding: 25px;
      margin: 15px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 320px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    form:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    h2 {
      margin-bottom: 15px;
      color: #1a4d8f; /* blue subhead */
      text-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }

    input {
      display: block;
      margin: 12px auto;
      padding: 12px;
      width: 90%;
      border: 1px solid #e6d6c3;
      border-radius: 8px;
      font-size: 1em;
    }

    input:focus {
      outline: none;
      border-color: #1a4d8f;
      box-shadow: 0 0 5px #1a4d8f33;
    }

    button {
      background: linear-gradient(90deg, #1a4d8f, #3a6fcf); /* subtle blue gradient */
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s, transform 0.2s;
    }

    button:hover {
      background: linear-gradient(90deg, #b03a2e, #d65a4f); /* subtle red gradient */
      transform: scale(1.05);
    }

    #dashboard {
      display: none;
      background: linear-gradient(145deg, #fffaf0, #f0f5ff);
      padding: 25px;
      margin-top: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      background: linear-gradient(145deg, #fffaf0, #f0f5ff);
      color: #555;
      border-top: 3px solid #e6d6c3;
      text-align: center;
    }

    @media(max-width: 768px) {
      main {
        padding: 30px 10px;
      }
      form {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="/" class="logo">Durojaiye Alao Memorial College</a>
    <nav>
      <a href="/">Home</a>
      <a href="#signupLoginSection">Portal</a>
    </nav>
  </header>

  <!-- Main Section -->
  <main>
    <h1>Durojaiye Alao Memorial College Portal</h1>

    <section id="signupLoginSection" style="display:flex; flex-wrap:wrap; justify-content:center;">
      
      <!-- Sign Up Form -->
      <form id="signupForm">
        <h2>Sign Up</h2>
        <input type="text" id="fullname" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Sign Up</button>
      </form>

      <!-- Login Form -->
      <form id="loginForm">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

    </section>

    <!-- Dashboard -->
    <div id="dashboard">
      <h2>Welcome, <span id="userName"></span>!</h2>
      <p>You are now logged in to the Durojaiye Alao Memorial College Portal.</p>
      <button id="logoutBtn">Logout</button>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Durojaiye Alao Memorial College</p>
  </footer>

  <!-- JavaScript -->
  <script>
    function getUsers() {
      return JSON.parse(localStorage.getItem("users") || "[]");
    }

    // Sign Up
    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const fullname = document.getElementById("fullname").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const users = getUsers();

      if (users.find(user => user.email === email)) {
        alert("User already exists!");
        return;
      }

      users.push({ fullname, email, password });
      localStorage.setItem("users", JSON.stringify(users));
      alert("Sign up successful! You can now log in.");
      this.reset();
    });

    // Login
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        document.getElementById("userName").textContent = user.fullname;
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginForm").style.display = "none";
        alert(`Welcome back, ${user.fullname}!`);
      } else {
        alert("Invalid email or password!");
      }
    });

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", function() {
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("signupForm").style.display = "block";
      document.getElementById("loginForm").style.display = "block";
      alert("You have been logged out.");
    });
  </script>

</body>
</html>
