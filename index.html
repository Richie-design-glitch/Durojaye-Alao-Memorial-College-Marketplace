<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Durojaiye Alao Memorial College</title>
  <meta name="description" content="Durojaiye Alao Memorial College Portal">
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f5f5f5; }
    h1 { color: #2c3e50; }
    form { background: white; padding: 20px; margin: 20px auto; width: 300px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input { display: block; margin: 10px auto; padding: 10px; width: 90%; }
    button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
    #dashboard { display: none; margin-top: 20px; }
    header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#2c3e50; color:white; border-radius:8px; }
    header a.logo { color:white; text-decoration:none; font-weight:bold; font-size:1.2em; }
    nav a { color:white; margin-left:15px; text-decoration:none; }
    footer { margin-top:50px; color:#555; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="/" class="logo">Durojaiye Alao Memorial College</a>
    <nav>
      <a href="/">Home</a>
      <a href="#signupLoginSection">Portal</a>
    </nav>
  </header>

  <!-- Main Section -->
  <main>
    <section id="signupLoginSection">
      <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">

        <!-- Sign Up Form -->
        <form id="signupForm">
          <h2>Sign Up</h2>
          <input type="text" id="fullname" placeholder="Full Name" required />
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit">Sign Up</button>
        </form>

        <!-- Login Form -->
        <form id="loginForm">
          <h2>Login</h2>
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>

      </div>

      <!-- Dashboard -->
      <div id="dashboard">
        <h2>Welcome, <span id="userName"></span>!</h2>
        <p>You are now logged in to the Durojaiye Alao Memorial College Portal.</p>
        <button id="logoutBtn">Logout</button>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Durojaiye Alao Memorial College</p>
  </footer>

  <!-- JavaScript -->
  <script>
    function getUsers() {
      return JSON.parse(localStorage.getItem("users") || "[]");
    }

    // Sign Up
    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const fullname = document.getElementById("fullname").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const users = getUsers();

      if (users.find(user => user.email === email)) {
        alert("User already exists!");
        return;
      }

      users.push({ fullname, email, password });
      localStorage.setItem("users", JSON.stringify(users));
      alert("Sign up successful! You can now log in.");
      this.reset();
    });

    // Login
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        document.getElementById("userName").textContent = user.fullname;
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginForm").style.display = "none";
        alert(`Welcome back, ${user.fullname}!`);
      } else {
        alert("Invalid email or password!");
      }
    });

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", function() {
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("signupForm").style.display = "block";
      document.getElementById("loginForm").style.display = "block";
      alert("You have been logged out.");
    });
  </script>

</body>
</html>
