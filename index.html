<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Durojaiye Alao Memorial College</title>
  <meta name="description" content="Durojaiye Alao Memorial College Portal">
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f5f5f5; }
    h1 { color: #2c3e50; }
    form { background: white; padding: 20px; margin: 20px auto; width: 300px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input { display: block; margin: 10px auto; padding: 10px; width: 90%; }
    button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
    #dashboard { display: none; margin-top: 20px; }
  </style>
</head>
<body>

  <h1>Durojaiye Alao Memorial College</h1>

  <!-- Sign Up Form -->
  <form id="signupForm">
    <h2>Sign Up</h2>
    <input type="text" id="fullname" placeholder="Full Name" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Sign Up</button>
  </form>

  <!-- Login Form -->
  <form id="loginForm">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email" required />
    <input type="password" id="loginPassword" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <!-- Dashboard after login -->
  <div id="dashboard">
    <h2>Welcome, <span id="userName"></span>!</h2>
    <p>You are now logged in to Durojaiye Alao Memorial College Portal.</p>
    <button id="logoutBtn">Logout</button>
  </div>

  <footer>
    <p>&copy; 2026 Durojaiye Alao Memorial College</p>
  </footer>

  <script>
    // Helper function to get users from local storage
    function getUsers() {
      return JSON.parse(localStorage.getItem("users") || "[]");
    }

    // Sign Up
    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const fullname = document.getElementById("fullname").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const users = getUsers();

      if (users.find(user => user.email === email)) {
        alert("User already exists!");
        return;
      }

      users.push({ fullname, email, password });
      localStorage.setItem("users", JSON.stringify(users));
      alert("Sign up successful! You can now log in.");
      this.reset();
    });

    // Login
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        alert(`Welcome back, ${user.fullname}!`);
        document.getElementById("userName").textContent = user.fullname;
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginForm").style.display = "none";
      } else {
        alert("Invalid email or password!");
      }
    });

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", function() {
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("signupForm").style.display = "block";
      document.getElementById("loginForm").style.display = "block";
      alert("You have been logged out.");
    });
  </script>

</body>
</html>
