<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durojaye Alao Memorial College Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #1dbf73;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: #1dbf73;
  color: white;
  border: none;
  cursor: pointer;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 5px;
}

.hidden { display: none; }
</style>
</head>

<body>

<header>
<h2>Durojaye Alao Memorial College Marketplace</h2>
</header>

<div class="container">

<!-- AUTH -->
<div id="auth">
<h3>Login / Sign Up</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h3>Post a Service</h3>
<input id="title" placeholder="Service Title">
<input id="price" placeholder="Price">
<button onclick="addService()">Post</button>

<h3>Marketplace</h3>
<div id="services"></div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "PASTE_YOUR_PROJECT_URL",
  "PASTE_YOUR_ANON_KEY"
);

// AUTO LOGIN CHECK
async function checkUser(){
  const { data } = await supabase.auth.getUser();
  if(data.user){
    showApp();
  }
}
checkUser();

// SIGNUP
async function signup(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let { error } = await supabase.auth.signUp({ email, password });

  if(error) alert(error.message);
  else alert("Check your email!");
}

// LOGIN
async function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error) alert(error.message);
  else showApp();
}

// SHOW APP
function showApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  loadServices();
}

// LOGOUT
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// ADD SERVICE
async function addService(){
  let title = document.getElementById("title").value;
  let price = document.getElementById("price").value;

  await supabase.from("services").insert([{ title, price }]);
  loadServices();
}

// LOAD SERVICES
async function loadServices(){
  let { data } = await supabase.from("services").select("*");

  let container = document.getElementById("services");
  container.innerHTML = "";

  data.forEach(s => {
    container.innerHTML += `
      <div class="card">
        <h4>${s.title}</h4>
        <p>₦${s.price}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
